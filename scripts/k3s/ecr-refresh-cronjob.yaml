---
# ServiceAccount for the ECR refresh job
apiVersion: v1
kind: ServiceAccount
metadata:
  name: ecr-refresher
  namespace: openclaw

---
# Role: allow patching/creating the ecr-secret only
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: ecr-secret-writer
  namespace: openclaw
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    resourceNames: ["ecr-secret"]
    verbs: ["get", "patch"]

---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: ecr-refresher-binding
  namespace: openclaw
subjects:
  - kind: ServiceAccount
    name: ecr-refresher
    namespace: openclaw
roleRef:
  kind: Role
  name: ecr-secret-writer
  apiGroup: rbac.authorization.k8s.io

---
# CronJob: refresh ECR credentials every 6 hours
apiVersion: batch/v1
kind: CronJob
metadata:
  name: ecr-secret-refresher
  namespace: openclaw
spec:
  # Every 6 hours — ECR tokens expire after 12h
  schedule: "0 */6 * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      backoffLimit: 2
      template:
        spec:
          serviceAccountName: ecr-refresher
          restartPolicy: OnFailure
          containers:
            - name: ecr-refresher
              image: amazon/aws-cli:2.22.0
              imagePullPolicy: IfNotPresent
              command:
                - /bin/bash
                - -euo
                - pipefail
                - -c
                - |
                  echo "Assuming ECR role..."
                  read -r AWS_ACCESS_KEY_ID AWS_SECRET_ACCESS_KEY AWS_SESSION_TOKEN <<< \
                    $(aws sts assume-role \
                      --role-arn "$ROLE_ARN" \
                      --role-session-name ecr-refresh-$(date +%s) \
                      --query 'Credentials.[AccessKeyId,SecretAccessKey,SessionToken]' \
                      --output text)
                  export AWS_ACCESS_KEY_ID AWS_SECRET_ACCESS_KEY AWS_SESSION_TOKEN

                  echo "Getting ECR login password..."
                  ECR_PASSWORD=$(aws ecr get-login-password --region "$AWS_REGION")

                  # Build dockerconfigjson and update secret via k8s API (no kubectl needed)
                  echo "Updating ecr-secret via k8s API..."
                  DOCKER_AUTH=$(echo -n "AWS:${ECR_PASSWORD}" | base64 -w 0)
                  DOCKER_CONFIG=$(cat <<EOF
                  {"auths":{"${ECR_REGISTRY}":{"username":"AWS","password":"${ECR_PASSWORD}","auth":"${DOCKER_AUTH}"}}}
                  EOF
                  )
                  DOCKER_CONFIG_B64=$(echo -n "$DOCKER_CONFIG" | tr -d '[:space:]' | base64 -w 0)

                  K8S_API="https://kubernetes.default.svc"
                  SA_PATH="/var/run/secrets/kubernetes.io/serviceaccount"
                  SA_TOKEN=$(cat "${SA_PATH}/token")
                  CA_CERT="${SA_PATH}/ca.crt"
                  NAMESPACE=$(cat "${SA_PATH}/namespace")

                  # Patch the existing secret (replace .dockerconfigjson)
                  HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
                    -X PATCH \
                    -H "Authorization: Bearer ${SA_TOKEN}" \
                    -H "Content-Type: application/strategic-merge-patch+json" \
                    --cacert "$CA_CERT" \
                    "${K8S_API}/api/v1/namespaces/${NAMESPACE}/secrets/ecr-secret" \
                    -d "{\"data\":{\".dockerconfigjson\":\"${DOCKER_CONFIG_B64}\"}}")

                  if [[ "$HTTP_STATUS" == "200" ]]; then
                    echo "ECR secret refreshed successfully at $(date -u)"
                  else
                    echo "ERROR: k8s API returned HTTP $HTTP_STATUS"
                    exit 1
                  fi
              env:
                - name: AWS_REGION
                  value: ap-southeast-2
                - name: ECR_REGISTRY
                  value: 826182175287.dkr.ecr.ap-southeast-2.amazonaws.com
                - name: ROLE_ARN
                  value: arn:aws:iam::730335486558:role/ecr-dev-k8s-role
                - name: AWS_ACCESS_KEY_ID
                  valueFrom:
                    secretKeyRef:
                      name: aws-ecr-refresher-creds
                      key: aws_access_key_id
                - name: AWS_SECRET_ACCESS_KEY
                  valueFrom:
                    secretKeyRef:
                      name: aws-ecr-refresher-creds
                      key: aws_secret_access_key
